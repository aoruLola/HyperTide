services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  hypertide:
    image: ghcr.io/openlyura/hypertide-server:${HYPERTIDE_VERSION:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      STORAGE_PATH: /app/storage
    user: "10001:65534"
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    volumes:
      - ./data/storage:/app/storage
      - ./keys:/app/keys:ro
      - ./backups:/app/backups
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    expose:
      - "3000"
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "7"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          memory: 512M

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      hypertide:
        condition: service_healthy
    environment:
      HYPERTIDE_PUBLIC_HOST: ${HYPERTIDE_PUBLIC_HOST}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy:/data
      - ./data/caddy-config:/config
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
