name: hypertide

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hypertide}
      POSTGRES_USER: ${POSTGRES_USER:-hypertide}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hypertide}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - hypertide-pg-data:/var/lib/postgresql/data

  jwt-keys:
    image: alpine:3.20
    restart: "no"
    command: >
      sh -c "apk add --no-cache openssl >/dev/null &&
      mkdir -p /keys &&
      if [ ! -f /keys/jwt-private.pem ] || [ ! -f /keys/jwt-public.pem ]; then
      openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out /keys/jwt-private.pem &&
      openssl rsa -in /keys/jwt-private.pem -pubout -out /keys/jwt-public.pem;
      fi"
    volumes:
      - ./keys:/keys

  hypertide:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      jwt-keys:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-hypertide}:${POSTGRES_PASSWORD:-hypertide}@postgres:5432/${POSTGRES_DB:-hypertide}
      DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-10}
      DB_ACQUIRE_TIMEOUT_SECS: ${DB_ACQUIRE_TIMEOUT_SECS:-5}
      AUTH_PEPPER: ${AUTH_PEPPER:-hypertide-dev-pepper}
      JWT_PRIVATE_KEY_PATH: /keys/jwt-private.pem
      JWT_PUBLIC_KEY_PATH: /keys/jwt-public.pem
      JWT_ISSUER: ${JWT_ISSUER:-hypertide}
      ACCESS_TOKEN_TTL_SECS: ${ACCESS_TOKEN_TTL_SECS:-900}
      REFRESH_TOKEN_TTL_SECS: ${REFRESH_TOKEN_TTL_SECS:-604800}
      RUST_LOG: ${RUST_LOG:-hypertide_cli=info,hypertide=info}
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - ./keys:/keys:ro
      - ../storage:/app/storage

volumes:
  hypertide-pg-data:
