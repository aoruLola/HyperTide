name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --workspace

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: hypertide
          POSTGRES_USER: hypertide
          POSTGRES_PASSWORD: hypertide
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://hypertide:hypertide@localhost/hypertide
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check

  cli-smoke:
    name: CLI Smoke
    runs-on: ubuntu-latest
    needs: [check, clippy]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: hypertide
          POSTGRES_USER: hypertide
          POSTGRES_PASSWORD: hypertide
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://hypertide:hypertide@localhost/hypertide
      MASTER_KEY: dev-master-key
      STORAGE_PATH: /tmp/hypertide-smoke-storage
      JWT_PRIVATE_KEY_PATH: /tmp/hypertide-jwt/private.pem
      JWT_PUBLIC_KEY_PATH: /tmp/hypertide-jwt/public.pem
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Build server and CLI
        run: cargo build --workspace
      - name: Generate JWT keys
        run: |
          mkdir -p /tmp/hypertide-jwt
          openssl genrsa -out /tmp/hypertide-jwt/private.pem 2048
          openssl rsa -in /tmp/hypertide-jwt/private.pem -pubout -out /tmp/hypertide-jwt/public.pem
      - name: Start server
        run: |
          ./target/debug/hypertide &
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health/live >/dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            sleep 1
          done
      - name: Run CLI smoke test
        run: bash deploy/smoke.sh http://localhost:3000

  compose-smoke:
    name: Compose Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build and smoke production Compose stack
        run: bash deploy/server/ci-compose-smoke.sh

  backup-restore-smoke:
    name: Backup Restore Smoke
    runs-on: ubuntu-latest
    needs: compose-smoke
    steps:
      - uses: actions/checkout@v4
      - name: Create backup from production Compose stack
        run: bash deploy/server/ci-compose-smoke.sh
      - name: Restore backup into fresh Compose stack
        run: bash deploy/server/ci-restore-smoke.sh
