name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: hypertide-linux-x86_64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: hypertide-windows-x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: hypertide-macos-x86_64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build server
        run: cargo build --release -p hypertide-server --target ${{ matrix.target }}

      - name: Build CLI
        run: cargo build --release -p hypertide-cli --target ${{ matrix.target }}

      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/hypertide dist/
          cp target/${{ matrix.target }}/release/ht dist/
          cp -r deploy dist/
          cp -r docs dist/
          cp README.md CONTRIBUTING.md SECURITY.md dist/
          cd dist && tar czf ../${{ matrix.artifact }}.tar.gz .

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir dist
          cp target/${{ matrix.target }}/release/hypertide.exe dist/
          cp target/${{ matrix.target }}/release/ht.exe dist/
          cp -r deploy dist/
          cp -r docs dist/
          cp README.md CONTRIBUTING.md SECURITY.md dist/
          Compress-Archive -Path dist/* -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
